name: Update days countdown

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Calculate days remaining
        run: |
          TARGET="2026-09-01"
          TODAY=$(date -u +%Y-%m-%d)
          DAYS=$(( ( $(date -d "$TARGET" +%s) - $(date -d "$TODAY" +%s) ) / 86400 ))
          echo "{\"days\": $DAYS}" > days.json

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add days.json
          git diff --staged --quiet || git commit -m "chore: update days countdown"
          git push
